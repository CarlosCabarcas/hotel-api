name: Deploy Laravel API via Docker

# Trigger the workflow on push to the main branch
on:
  push:
    branches:
      - main  # <-- Change this to 'master' if your main branch is named master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to your project directory on the server
            cd /var/www/hotel-api #

            # Fetch latest changes from Git
            git pull origin main

            # Rebuild and restart the Docker containers on the server
            docker compose down
            docker compose up -d --build

            # Optional: Ensure everything is clean and fresh
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan view:clear
